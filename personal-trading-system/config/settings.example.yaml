# 个人量化交易系统配置模板
# 复制为 settings.yaml 并修改配置

# 系统配置
system:
  name: "个人量化交易系统"
  version: "1.0.0"
  debug: false
  timezone: "Asia/Shanghai"
  
  # 数据存储路径（相对路径）
  data_dir: "../data"
  log_dir: "../logs"
  backup_dir: "../backups"

# 安全配置
security:
  # 主密钥（用于加密API密钥，务必保密！）
  master_key: "请设置一个强密码作为主密钥"
  
  # API密钥加密配置
  encryption:
    algorithm: "AES-GCM"
    key_derivation_iterations: 100000
  
  # 会话配置
  session_timeout: 3600  # 1小时

# 交易配置
trading:
  # 默认交易所
  default_exchange: "okx"
  
  # 交易模式
  mode: "paper"  # paper: 模拟交易, live: 实盘交易
  
  # 默认交易对
  default_symbol: "BTC/USDT"
  
  # 交易时间框架
  timeframe: "1h"  # 1m, 5m, 15m, 1h, 4h, 1d
  
  # 风控配置
  risk:
    daily_loss_limit: 0.02  # 单日最大亏损2%
    max_position: 0.3       # 单币种最大仓位30%
    stop_loss: 0.05         # 止损5%
    take_profit: 0.10       # 止盈10%

# 策略配置
strategies:
  # 可用策略列表
  enabled:
    - "ma_crossover"
    - "rsi_reversion"
  
  # 均线交叉策略参数
  ma_crossover:
    fast_period: 10
    slow_period: 30
    volume_threshold: 1.5
  
  # RSI回归策略参数
  rsi_reversion:
    period: 14
    oversold: 30
    overbought: 70
    rsi_exit: 50

# 通知配置
notifications:
  enabled: true
  
  # 飞书通知
  feishu:
    enabled: true
    webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxx"
    
    # 通知类型
    notify_on:
      - "order_filled"     # 订单成交
      - "system_error"     # 系统错误
      - "daily_report"     # 每日报告
      - "risk_warning"     # 风险警告
  
  # 邮件通知（可选）
  email:
    enabled: false
    smtp_server: "smtp.example.com"
    smtp_port: 587
    username: "your-email@example.com"
    password: "your-password"

# 数据配置
data:
  # 本地数据存储
  storage:
    type: "sqlite"
    path: "../data/trading.db"
  
  # 数据更新频率（秒）
  update_interval: 120  # 2分钟
  
  # 历史数据保留天数
  history_days: 30

# 日志配置
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  rotation: "1 day"
  retention: "7 days"

# API配置
api:
  host: "127.0.0.1"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

# 前端配置
frontend:
  port: 3000
  title: "个人量化交易系统"